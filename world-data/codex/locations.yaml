- id: loc_north_gate
  name: 黑松镇·北门
  type: location
  tags:
    - town_entrance
    - 黑松镇
  description: 黑松镇的北面入口，石砌城门两侧各立一盏油灯。铁闸今日比寻常提前落闸，夜巡记录、车辙和狼爪印让守卫的秩序感显出裂缝。
  player_facing:
    short_label: 北门
    first_visit: 你来到黑松镇北门，铁闸比寻常提前落下，守卫把夜巡记录压在臂弯里，门外泥地上有交错的车辙和狼爪印。
    revisit: 你回到黑松镇北门，提前落闸的铁链仍垂在门侧，夜巡记录和门外痕迹让这里的秩序显得不再可靠。
    sensory:
      sights:
        - 石砌城门与提前落下的铁闸
        - 泥地上并行又交错的车辙和狼爪印
      sounds:
        - 铁链在风中轻撞门栓
        - 守卫翻动夜巡记录时刻意压低的纸页声
      smells:
