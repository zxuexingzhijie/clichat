      - 黑松镇近期戒备比往常更严，夜间落闸时间被提前过
    hidden_knowledge:
      - 他见过夜巡名册被临时改线，北林方向的巡逻空出过一段时间
      - 他知道提前落闸的口令来得太早，但不知道谁在上层推动
      - 他只听见同僚提到“名单”和“别问名字”，不理解逐名印或完整幕后
