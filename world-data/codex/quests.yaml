- id: quest_main_01
  auto_accept: true
  name: 黑松镇的秘密
  type: quest
  quest_type: main
  region: 黑松镇
  tags:
    - main
    - 黑松镇
  description: 黑松镇接连发生失踪事件，调查背后的真相。
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1.0
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_rumor
      description: 调查关于北林失踪事件的谣言
      trigger:
        event: dialogue_ended
        targetId: npc_bartender
      objectives:
        - id: obj_talk_any_npc
          type: talk
          description: 与任意NPC交谈，打听谣言
      nextStageId: stage_disappearances
    - id: stage_disappearances
      description: 深入调查——失踪者的共同点，矿路封锁的真相
      trigger:
        event: location_entered
        targetId: loc_abandoned_camp
      objectives:
        - id: obj_visit_camp_or_beggar
          type: visit_location
          targetId: loc_abandoned_camp
          description: 前往废弃营地调查（或与瞎子孙交谈获得线索）
      nextStageId: stage_truth_in_forest
    - id: stage_truth_in_forest
      description: 洞穴中的古代符文——与五年前的狼灾相同；月华认出了它们
      trigger:
        event: location_entered
        targetId: loc_dark_cave
      objectives:
        - id: obj_enter_cave
          type: visit_location
          targetId: loc_dark_cave
          description: 进入黑暗洞穴
        - id: obj_talk_priestess
          type: talk
          targetId: npc_priestess
          description: 与月华交谈，了解符文含义
      nextStageId: stage_mayor_secret
    - id: stage_mayor_secret
      description: 镇长的秘密——五年前的交易，外来势力的回归
      trigger:
        event: dialogue_ended
        targetId: npc_elder
      objectives:
        - id: obj_confront_elder
          type: talk
          targetId: npc_elder
          description: 以证据质问王德（或通过阿鬼迂回接近）
      nextStageId: stage_allies_decision
    - id: stage_allies_decision
      description: 三条路线：义之道（陈铁柱）/ 和之道（王德）/ 暗之道（阿鬼）
      trigger:
        event: dialogue_ended
        targetId: npc_captain
      objectives:
        - id: obj_talk_priestess_alliance
          type: talk
          targetId: npc_priestess
          description: 与月华商议对策
        - id: obj_choose_alliance
          type: talk
          description: 选择盟友：陈铁柱（义）、王德（和）、或阿鬼（暗）
      conditional_next_stages:
        - condition_flag: justice_score_locked
          nextStageId: stage_consequence_justice
        - condition_flag: shadow_score_locked
          nextStageId: stage_consequence_shadow
        - condition_flag: pragmatism_score_locked
          nextStageId: stage_consequence_harmony
      nextStageId: stage_consequence_harmony
    - id: stage_consequence_justice
      description: 义之道结局——真相公开，陈铁柱独自哭泣，镇子将面临震荡
      trigger:
        event: dialogue_ended
        targetId: npc_captain
      objectives:
        - id: obj_confront_captain
          type: talk
          targetId: npc_captain
          description: 与陈铁柱完成对质对话
      nextStageId: null
    - id: stage_consequence_harmony
      description: 和之道结局——秘密被压制，月华沉默，瞎子孙消失
      trigger:
        event: dialogue_ended
        targetId: npc_elder
      objectives:
        - id: obj_agreement_elder
          type: talk
          targetId: npc_elder
          description: 与王德完成压制协议
      nextStageId: null
    - id: stage_consequence_shadow
      description: 暗之道结局——阿鬼请玩家喝酒，地下势力永久扎根黑松镇
      trigger:
        event: dialogue_ended
        targetId: npc_shadow_contact
      objectives:
        - id: obj_deal_shadow
          type: talk
          targetId: npc_shadow_contact
          description: 与阿鬼完成交易
      nextStageId: null
  rewards:
    reputation_delta:
      faction_guard: 20

- id: quest_side_missing_ore
  auto_accept: true
  name: 失踪的矿石
  type: quest
  quest_type: side
  region: 黑松镇
  required_npc_id: npc_blacksmith
  tags:
    - side
    - 黑松镇
  description: 铁匠老赵急需矿石，听说北林废弃矿洞里还有存货。（Stage 2后：矿路被故意封锁，阻止外人发现洞穴）
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1.0
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_find_ore
      description: 寻找老赵需要的铁矿石
      trigger:
        event: item_found
        targetId: item_iron_ore
      objectives:
        - id: obj_find_ore
          type: find_item
          targetId: item_iron_ore
          description: 在北林找到铁矿石
      nextStageId: stage_deliver
    - id: stage_deliver
      description: 将矿石交给铁匠
      trigger:
        event: dialogue_ended
        targetId: npc_blacksmith
      objectives:
        - id: obj_deliver_ore
          type: talk
          targetId: npc_blacksmith
          description: 将矿石交给铁匠老赵
      nextStageId: null
  rewards:
    gold: 80
    relation_delta:
      npc_blacksmith: 10

- id: quest_side_overdue_debt
  auto_accept: true
  name: 拖欠的债务
  type: quest
  quest_type: side
  region: 黑松镇
  required_npc_id: npc_merchant_afu
  min_reputation: -20
  tags:
    - side
    - 黑松镇
  description: 阿福被人欠着一笔旧账，他需要人帮忙讨回来。（Stage 4后：瞎子孙的"债"是封口费，他是关键证人）
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1.0
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_locate_debtor
      description: 找到欠债人的下落
      trigger:
        event: dialogue_ended
        targetId: npc_merchant_afu
      objectives:
        - id: obj_talk_merchant
          type: talk
          targetId: npc_merchant_afu
          description: 从阿福处得知欠债人信息
      nextStageId: stage_collect
    - id: stage_collect
      description: 向欠债人收回债款
      trigger:
        event: dialogue_ended
        targetId: npc_beggar
      objectives:
        - id: obj_collect_debt
          type: talk
          targetId: npc_beggar
          description: 与瞎子孙谈判收债
      nextStageId: null
  rewards:
    gold: 120
    reputation_delta:
      faction_merchants: 15

- id: quest_side_wolf_bounty
  auto_accept: true
  name: 狼群悬赏
  type: quest
  quest_type: side
  region: 黑松镇
  required_npc_id: npc_hunter
  tags:
    - side
    - 黑松镇
  description: 猎人阿虎请求帮忙清除北林中异常活跃的狼群。（Stage 3后：猎狼只是治标，狼群异常来自洞穴祭祀地）
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1.0
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_hunt_wolves
      description: 猎杀威胁村民的狼群
      trigger:
        event: combat_ended
        targetId: enemy_wolf
      objectives:
        - id: obj_defeat_wolves
          type: defeat_enemy
          targetId: enemy_wolf
          description: 击败北林中的狼群
      nextStageId: stage_report
    - id: stage_report
      description: 向阿虎汇报任务完成情况
      trigger:
        event: dialogue_ended
        targetId: npc_hunter
      objectives:
        - id: obj_report_hunter
          type: talk
          targetId: npc_hunter
          description: 向猎人阿虎汇报猎狼结果
      nextStageId: null
  rewards:
    gold: 60
    relation_delta:
      npc_hunter: 15
