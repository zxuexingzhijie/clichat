- id: quest_main_01
  auto_accept: true
  name: 黑松镇的秘密
  type: quest
  quest_type: main
  region: 黑松镇
  tags:
    - main
    - 黑松镇
  description: 黑松镇接连发生失踪事件，调查背后的真相。
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1.0
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_rumor
      description: 调查关于北林失踪事件的谣言
      trigger:
        event: dialogue_ended
        targetId: npc_bartender
      objectives:
        - id: obj_talk_any_npc
          type: talk
          description: 与任意NPC交谈，打听谣言
      nextStageId: stage_investigate
    - id: stage_investigate
      description: 追查线索，深入黑暗洞穴
      trigger:
        event: location_entered
        targetId: loc_dark_cave
      objectives:
        - id: obj_enter_cave
          type: visit_location
          targetId: loc_dark_cave
          description: 进入黑暗洞穴调查
      nextStageId: stage_expose
    - id: stage_expose
      description: 揭露狼灾真相
      trigger:
        event: dialogue_ended
        targetId: npc_elder
      objectives:
        - id: obj_talk_elder
          type: talk
          targetId: npc_elder
          description: 与镇长王德交谈，揭露真相
        - id: obj_find_evidence
          type: find_item
          targetId: item_evidence
          description: 找到关键证据
      nextStageId: null
      completionCondition: all_objectives
  rewards:
    reputation_delta:
      faction_guard: 20

