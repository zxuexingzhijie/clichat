      description: 将矿石交给铁匠
      trigger:
        event: dialogue_ended
        targetId: npc_blacksmith
      objectives:
        - id: obj_deliver_ore
          type: talk
          targetId: npc_blacksmith
          description: 将矿石交给铁匠老赵
      nextStageId: null
  world_effects_none: true
  rewards:
    gold: 80
    relation_delta:
      npc_blacksmith: 10
  player_facing:
    short_label: 失踪的矿石
  ai_grounding:
    must_know:
      - 铁匠老赵急需矿石，听说北林废弃矿洞里还有存货。
    must_not_invent:
      - 不要扩展此条目的设定，除非世界状态或剧情明确提供。
    reveal_policy:
      default: public_surface_only
      after_stage_disappearances: Stage 2后可揭示：矿路被故意封锁，阻止外人发现洞穴。
