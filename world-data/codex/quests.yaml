- id: quest_main_01
  auto_accept: true
  name: 黑松镇的秘密
  type: quest
  quest_type: main
  region: 黑松镇
  tags:
    - main
    - 黑松镇
  description: 黑松镇接连发生失踪事件，调查背后的真相。
  epistemic:
    authority: canonical_truth
    truth_status: "true"
    scope: local
    visibility: public
    confidence: 1
    source_type: authorial
    known_by: []
    contradicts: []
    volatility: stable
  stages:
    - id: stage_rumor
      description: 调查关于北林失踪事件的谣言
      trigger:
        event: dialogue_ended
        targetId: npc_bartender
      objectives:
        - id: obj_talk_any_npc
          type: talk
          description: 与任意NPC交谈，打听谣言
      nextStageId: stage_disappearances
    - id: stage_disappearances
      description: 深入调查——失踪者的共同点，矿路封锁的真相
      trigger:
        event: location_entered
        targetId: loc_abandoned_camp
      objectives:
        - id: obj_visit_camp_or_beggar
          type: visit_location
          targetId: loc_abandoned_camp
          description: 前往废弃营地调查（或与瞎子孙交谈获得线索）
      nextStageId: stage_truth_in_forest
    - id: stage_truth_in_forest
      description: 洞穴中的古代符文——与五年前的狼灾相同；月华认出了它们
      trigger:
        event: location_entered
        targetId: loc_dark_cave
      objectives:
        - id: obj_enter_cave
          type: visit_location
          targetId: loc_dark_cave
          description: 进入黑暗洞穴
        - id: obj_talk_priestess
          type: talk
          targetId: npc_priestess
          description: 与月华交谈，了解符文含义
      nextStageId: stage_mayor_secret
    - id: stage_mayor_secret
      description: 镇长的秘密——五年前的交易，外来势力的回归
      trigger:
        event: dialogue_ended
        targetId: npc_elder
      objectives:
        - id: obj_confront_elder
          type: talk
          targetId: npc_elder
          description: 以证据质问王德（或通过阿鬼迂回接近）
      nextStageId: stage_allies_decision
    - id: stage_allies_decision
      description: 三条路线：义之道（陈铁柱）/ 和之道（王德）/ 暗之道（阿鬼）
      trigger:
        event: dialogue_ended
        targetId: npc_captain
      objectives:
        - id: obj_talk_priestess_alliance
          type: talk
          targetId: npc_priestess
          description: 与月华商议对策
        - id: obj_choose_alliance
          type: talk
          description: 选择盟友：陈铁柱（义）、王德（和）、或阿鬼（暗）
      conditional_next_stages:
        - condition_flag: justice_score_locked
          nextStageId: stage_consequence_justice
        - condition_flag: shadow_score_locked
          nextStageId: stage_consequence_shadow
        - condition_flag: pragmatism_score_locked
          nextStageId: stage_consequence_harmony
      nextStageId: stage_consequence_harmony
    - id: stage_consequence_justice
      description: 义之道结局——真相公开，陈铁柱独自哭泣，镇子将面临震荡
      trigger:
        event: dialogue_ended
        targetId: npc_captain
      objectives:
        - id: obj_confront_captain
          type: talk
          targetId: npc_captain
          description: 与陈铁柱完成对质对话
      nextStageId: null
    - id: stage_consequence_harmony
      description: 和之道结局——秘密被压制，月华沉默，瞎子孙消失
      trigger:
        event: dialogue_ended
        targetId: npc_elder
      objectives:
        - id: obj_agreement_elder
          type: talk
          targetId: npc_elder
          description: 与王德完成压制协议
      nextStageId: null
    - id: stage_consequence_shadow
      description: 暗之道结局——阿鬼请玩家喝酒，地下势力永久扎根黑松镇
      trigger:
        event: dialogue_ended
        targetId: npc_shadow_contact
      objectives:
        - id: obj_deal_shadow
          type: talk
          targetId: npc_shadow_contact
          description: 与阿鬼完成交易
      nextStageId: null
  world_effects:
    on_stage_enter:
      stage_rumor:
        rumors_created:
          - id: rumor_black_pine_disappearances
            statement: 黑松镇近来有人在北林方向失踪，镇民只敢私下议论。
            scope: location
            scope_id: loc_tavern
            truth_status: rumor
            confidence: 0.7
            spread:
              - loc_tavern
              - loc_market
            starts_at_stage: stage_rumor
      stage_disappearances:
        facts_created:
          - id: fact_disappearances_share_forest_route
            statement: 近期失踪者多数与北林道路、废弃营地或矿路传闻有关。
            scope: quest
            scope_id: quest_main_01
            truth_status: confirmed
            confidence: 0.8
      stage_truth_in_forest:
        facts_created:
          - id: fact_cave_runes_match_old_disaster
            statement: 黑暗洞穴中的古代符文与五年前狼灾有关的痕迹相似。
            scope: quest
            scope_id: quest_main_01
            truth_status: confirmed
            confidence: 0.9
            tags:
              - flag:ritual_site_active
      stage_mayor_secret:
        facts_created:
          - id: fact_mayor_secret_old_bargain
            statement: 王德知道五年前狼灾背后存在秘密协议。
            scope: npc
            scope_id: npc_elder
            truth_status: confirmed
            confidence: 0.9
            tags:
              - flag:mayor_secret_known
      stage_allies_decision:
        beliefs_created:
          - holder_id: npc_captain
            holder_type: npc
            subject_id: quest_main_01
            stance: knows
            statement: 玩家必须在公开真相、压下秘密或借助暗线之间选择盟友。
            confidence: 0.8
      stage_consequence_justice:
        facts_created:
          - id: fact_mayor_arrested_public_truth
            statement: 义之道结局中，王德被公开追责，黑松镇必须面对五年前的真相。
            scope: quest
            scope_id: quest_main_01
            truth_status: confirmed
            confidence: 1.0
            tags:
              - flag:mayor_arrested
      stage_consequence_harmony:
        facts_created:
          - id: fact_truth_suppressed_harmony_path
            statement: 和之道结局中，真相被压下，镇子的表面安稳被暂时保住。
            scope: quest
            scope_id: quest_main_01
            truth_status: confirmed
            confidence: 1.0
            tags:
              - flag:truth_suppressed
      stage_consequence_shadow:
        facts_created:
          - id: fact_shadow_deal_made_underworld_rooted
            statement: 暗之道结局中，阿鬼与玩家达成交易，地下势力在黑松镇扎下更深的根。
            scope: quest
            scope_id: quest_main_01
            truth_status: confirmed
            confidence: 1.0
            tags:
              - flag:shadow_deal_made
    on_complete:
      beliefs_created:
        - holder_id: npc_elder
          holder_type: npc
          subject_id: quest_main_01
          stance: knows
          statement: 玩家已经触及黑松镇的核心秘密，后续选择会影响镇子的稳定。
          confidence: 0.8
  rewards:
    reputation_delta:
      faction_guard: 20
  player_facing:
    short_label: 黑松镇的秘密
  ai_grounding:
    must_know:
      - 黑松镇接连发生失踪事件，调查背后的真相。
    must_not_invent:
      - 不要扩展此条目的设定，除非世界状态或剧情明确提供。
    reveal_policy:
      default: public_surface_only
- id: quest_side_missing_ore
