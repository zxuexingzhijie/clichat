# Chronicle AI Model Configuration
# API key stored in .env.local (auto-loaded by Bun, no manual export needed)
#
# Priority: CLI args > environment variables > this file > built-in defaults
#
# DeepSeek official references:
# - deepseek-v4-pro supports 1M context and up to 384K max output tokens.
# - temperature guidance: coding/math 0.0, data analysis 1.0,
#   general conversation 1.3, creative writing 1.5.

default_profile: premium

profiles:
  cheap:
    roles:
      narrative-director:
        provider: deepseek
        model: deepseek-v4-pro
        temperature: 1.5
        maxTokens: 384000
      npc-actor:
        provider: deepseek
        model: deepseek-v4-pro
        temperature: 1.3
        maxTokens: 384000
      retrieval-planner:
        provider: deepseek
        model: deepseek-v4-pro
        temperature: 0.0
        maxTokens: 384000
      safety-filter:
        provider: deepseek
        model: deepseek-v4-pro
        temperature: 0.0
        maxTokens: 384000
      summarizer:
        provider: deepseek
        model: deepseek-v4-pro
        temperature: 1.0
        maxTokens: 384000
      quest-planner:
