name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate payload
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_DARWIN_ARM64: ${{ github.event.client_payload.darwin_arm64_sha256 }}
          SHA_DARWIN_X64: ${{ github.event.client_payload.darwin_x64_sha256 }}
          SHA_LINUX_X64: ${{ github.event.client_payload.linux_x64_sha256 }}
        run: |
          for var in VERSION SHA_DARWIN_ARM64 SHA_DARWIN_X64 SHA_LINUX_X64; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required payload field: $var"
              exit 1
            fi
          done

      - name: Update formula version and hashes
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_DARWIN_ARM64: ${{ github.event.client_payload.darwin_arm64_sha256 }}
          SHA_DARWIN_X64: ${{ github.event.client_payload.darwin_x64_sha256 }}
          SHA_LINUX_X64: ${{ github.event.client_payload.linux_x64_sha256 }}
        run: |
          CLEAN_VERSION="${VERSION#v}"

          sed -i \
            -e "s/version \".*\"/version \"${CLEAN_VERSION}\"/" \
            Formula/chronicle.rb

          sed -i \
            -e "s/PLACEHOLDER_DARWIN_ARM64/${SHA_DARWIN_ARM64}/" \
            -e "s/PLACEHOLDER_DARWIN_X64/${SHA_DARWIN_X64}/" \
            -e "s/PLACEHOLDER_LINUX_X64/${SHA_LINUX_X64}/" \
            Formula/chronicle.rb

          sed -i \
            -e "/darwin-arm64/{n; s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA_DARWIN_ARM64}\"/;}" \
            -e "/darwin-x64/{n; s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA_DARWIN_X64}\"/;}" \
            -e "/linux-x64/{n; s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA_LINUX_X64}\"/;}" \
            Formula/chronicle.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/chronicle.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update chronicle to ${CLEAN_VERSION}"
          git push
